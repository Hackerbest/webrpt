<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - เพิ่มเพลง</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Kanit', sans-serif;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #faf5ff, #fdf2f8);
      color: #111827;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .box {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 18px 45px rgba(168,85,247,.18);
      border: 1px solid #f3e8ff;
    }
    h1 { margin: 0 0 18px; color: #7e22ce; }
    label { display: block; margin-top: 12px; font-size: 14px; color: #6b7280; }
    input {
      width: 100%;
      margin-top: 6px;
      padding: 12px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      outline: none;
    }
    input:focus {
      border-color: #a855f7;
      box-shadow: 0 0 0 3px #f3e8ff;
    }
    button {
      width: 100%;
      margin-top: 16px;
      border: 0;
      border-radius: 12px;
      background: #a855f7;
      color: #fff;
      padding: 13px 16px;
      font-family: inherit;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #9333ea; }
    .logout { background: #f3f4f6; color: #374151; }
    .msg { margin-top: 14px; font-size: 14px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="box">
    <div id="loginBox">
      <h1>เข้าสู่ระบบแอดมิน</h1>

      <label>อีเมล</label>
      <input id="email" type="email" placeholder="email" />

      <label>รหัสผ่าน</label>
      <input id="password" type="password" placeholder="password" />

      <button id="loginBtn">เข้าสู่ระบบ</button>
      <p id="loginMsg" class="msg"></p>
    </div>

    <div id="adminBox" class="hidden">
      <h1>เพิ่มเพลงใหม่</h1>

      <label>ชื่อเพลง</label>
      <input id="title" placeholder="เช่น HTV 170 ชุดใหม่" />

      <label>ศิลปิน</label>
      <input id="artist" value="RAPEEPHAT REMIX" />

      <label>ราคา</label>
      <input id="price" type="number" value="300" />

      <label>เวลาเพลง</label>
      <input id="duration" placeholder="เช่น 4:20" />

      <label>เวลาเพลงเป็นวินาที</label>
      <input id="durationSecs" type="number" placeholder="เช่น 260" />

      <label>BPM / หมวด</label>
      <input id="category" placeholder="เช่น 170" />

      <label>ลิงก์ MP3</label>
      <input id="audioUrl" placeholder="https://.../song.mp3" />

      <label>ลิงก์รูปปก</label>
      <input id="coverUrl" placeholder="ไม่ใส่ก็ได้" />

      <button id="saveBtn">บันทึกเพลง</button>
      <button id="logoutBtn" class="logout">ออกจากระบบ</button>

      <p id="saveMsg" class="msg"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://qguunpxlgswkqnpwwhcnc.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable__L4vzMI9rSqZs33TkUZHFg_UTbupETn";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    const loginBox = document.getElementById("loginBox");
    const adminBox = document.getElementById("adminBox");
    const loginMsg = document.getElementById("loginMsg");
    const saveMsg = document.getElementById("saveMsg");

    async function checkSession() {
      const { data } = await supabaseClient.auth.getSession();

      if (data.session) {
        loginBox.classList.add("hidden");
        adminBox.classList.remove("hidden");
      } else {
        loginBox.classList.remove("hidden");
        adminBox.classList.add("hidden");
      }
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      loginMsg.textContent = "กำลังเข้าสู่ระบบ...";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        loginMsg.textContent = "เข้าสู่ระบบไม่สำเร็จ: " + error.message;
        return;
      }

      loginMsg.textContent = "";
      checkSession();
    });

    document.getElementById("saveBtn").addEventListener("click", async () => {
      saveMsg.textContent = "กำลังบันทึก...";

      const newSong = {
        title: document.getElementById("title").value.trim(),
        artist: document.getElementById("artist").value.trim(),
        price: Number(document.getElementById("price").value || 0),
        duration: document.getElementById("duration").value.trim(),
        duration_secs: Number(document.getElementById("durationSecs").value || 0),
        category: document.getElementById("category").value.trim(),
        audio_url: document.getElementById("audioUrl").value.trim(),
        cover_url: document.getElementById("coverUrl").value.trim()
      };

      if (!newSong.title || !newSong.category) {
        saveMsg.textContent = "กรอกชื่อเพลงกับ BPM ก่อน";
        return;
      }

      const { error } = await supabaseClient
        .from("products")
        .insert(newSong);

      if (error) {
        saveMsg.textContent = "บันทึกไม่สำเร็จ: " + error.message;
        return;
      }

      saveMsg.textContent = "บันทึกเพลงเรียบร้อยแล้ว";

      document.getElementById("title").value = "";
      document.getElementById("duration").value = "";
      document.getElementById("durationSecs").value = "";
      document.getElementById("category").value = "";
      document.getElementById("audioUrl").value = "";
      document.getElementById("coverUrl").value = "";
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      checkSession();
    });

    checkSession();
  </script>
</body>
</html>
